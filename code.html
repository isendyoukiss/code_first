<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Agent Content Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060c;--bg-elevated:#0c0d14;--surface:#111219;--surface-hover:#181924;
  --border:#1e2030;--border-active:#2a2d45;
  --accent:#f0a500;--accent-dim:#f0a50033;--accent-glow:#f0a50066;
  --cyan:#00d4aa;--cyan-dim:#00d4aa22;
  --coral:#ff4757;--coral-dim:#ff475722;
  --violet:#8b5cf6;--violet-dim:#8b5cf622;
  --blue:#3b82f6;--blue-dim:#3b82f622;
  --text:#e8e6e1;--text-secondary:#8a8790;--text-muted:#55536a;
  --font-display:'Syne','Noto Sans SC',sans-serif;
  --font-mono:'JetBrains Mono','Noto Sans SC',monospace;
  --font-body:'Noto Sans SC','JetBrains Mono',sans-serif;
  --radius:8px;--radius-lg:14px;
}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{
  background:var(--bg);color:var(--text);font-family:var(--font-body);
  min-height:100vh;overflow-x:hidden;position:relative;
}
body::before{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 15% 10%,rgba(240,165,0,.04) 0%,transparent 50%),
             radial-gradient(ellipse at 85% 80%,rgba(0,212,170,.03) 0%,transparent 50%);
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
.app{position:relative;z-index:1;display:grid;grid-template-rows:auto 1fr;height:100vh;padding:16px;gap:14px}
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);
}
.header-left{display:flex;align-items:center;gap:14px}
.logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#ff6b00);
  display:grid;place-items:center;font-family:var(--font-display);
  font-weight:800;font-size:16px;color:var(--bg);
}
.header-title{font-family:var(--font-display);font-weight:700;font-size:1.15rem;letter-spacing:-.02em}
.header-subtitle{font-size:.75rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:2px}
.header-right{display:flex;align-items:center;gap:10px}
.header-stat{
  display:flex;align-items:center;gap:6px;padding:6px 12px;
  background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);
  font-family:var(--font-mono);font-size:.75rem;
}
.header-stat .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-active{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.dot-idle{background:var(--text-muted)}
.dot-busy{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse-dot 1.5s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
  border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);
  color:var(--text);font-family:var(--font-mono);font-size:.78rem;cursor:pointer;
  transition:all .2s ease;white-space:nowrap;
}
.btn:hover{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600;}
.btn-primary:hover{background:#ffb820;box-shadow:0 0 20px var(--accent-glow)}
.main-grid{
  display:grid;grid-template-columns:1fr 1fr 340px;grid-template-rows:auto 1fr;
  gap:14px;min-height:0;
}
.agents-row{grid-column:1/-1;display:flex;gap:10px;overflow-x:auto;padding-bottom:2px}
.agent-card{
  flex:1;min-width:180px;padding:14px 16px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden;
}
.agent-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--agent-color,var(--border));opacity:.6;transition:opacity .25s;
}
.agent-card:hover{border-color:var(--border-active);transform:translateY(-2px)}
.agent-card:hover::before{opacity:1}
.agent-card.active{border-color:var(--agent-color,var(--accent))}
.agent-card.active::before{opacity:1;height:3px}
.agent-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.agent-icon{
  width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
  font-size:14px;background:var(--agent-bg,var(--bg-elevated));
}
.agent-name{font-family:var(--font-display);font-weight:600;font-size:.85rem}
.agent-status-badge{
  font-family:var(--font-mono);font-size:.6rem;padding:2px 7px;
  border-radius:20px;border:1px solid;text-transform:uppercase;letter-spacing:.05em;
}
.badge-idle{color:var(--text-muted);border-color:var(--text-muted)}
.badge-working{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.badge-reviewing{color:var(--violet);border-color:var(--violet);background:var(--violet-dim)}
.badge-completed{color:var(--cyan);border-color:var(--cyan);background:var(--cyan-dim)}
.agent-metrics{display:flex;gap:12px;margin-top:8px}
.agent-metric{font-family:var(--font-mono);font-size:.65rem;color:var(--text-secondary)}
.agent-metric span{color:var(--text);font-weight:500}
.agent-bar{height:3px;background:var(--bg-elevated);border-radius:9px;margin-top:10px;overflow:hidden}
.agent-bar-fill{height:100%;border-radius:9px;transition:width .6s ease;width:0}
.pipeline-panel{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:16px;display:flex;flex-direction:column;min-height:0;overflow:hidden;
}
.panel-title{
  font-family:var(--font-display);font-weight:700;font-size:.9rem;
  margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;
}
.panel-title .count{font-family:var(--font-mono);font-size:.7rem;color:var(--text-muted);font-weight:400;}
.pipeline-stages{display:flex;gap:6px;margin-bottom:14px}
.stage-tab{
  flex:1;padding:7px 4px;text-align:center;font-family:var(--font-mono);font-size:.65rem;
  color:var(--text-muted);border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;transition:all .2s;position:relative;
}
.stage-tab.active{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.stage-tab .stage-count{display:block;font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:2px;}
.content-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.content-item{
  padding:12px 14px;background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:var(--radius);cursor:pointer;transition:all .2s;
  border-left:3px solid transparent;
}
.content-item:hover{border-color:var(--border-active);background:var(--surface-hover)}
.content-item.selected{border-left-color:var(--accent);background:var(--accent-dim)}
.content-item-title{font-weight:500;font-size:.82rem;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.content-item-meta{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:.65rem;color:var(--text-muted)}
.content-item-tag{padding:1px 6px;border-radius:4px;font-size:.6rem;}
.log-panel{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:16px;display:flex;flex-direction:column;min-height:0;overflow:hidden;
}
.log-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.log-entry{
  display:flex;gap:10px;padding:6px 8px;border-radius:6px;
  font-family:var(--font-mono);font-size:.72rem;line-height:1.5;
  transition:background .15s;animation:logIn .3s ease;
}
@keyframes logIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.log-entry:hover{background:var(--surface-hover)}
.log-time{color:var(--text-muted);flex-shrink:0;width:52px}
.log-agent{flex-shrink:0;width:70px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.log-msg{color:var(--text-secondary);flex:1;word-break:break-all}
.log-msg strong{color:var(--text);font-weight:500}
.detail-panel{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:16px;display:flex;flex-direction:column;min-height:0;overflow:hidden;grid-row:2;
}
.detail-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text-muted);font-family:var(--font-mono);font-size:.78rem;gap:8px;
}
.detail-empty svg{opacity:.3}
.detail-content{flex:1;overflow-y:auto}
.detail-header{margin-bottom:14px}
.detail-title{font-family:var(--font-display);font-weight:700;font-size:1.05rem;margin-bottom:6px}
.detail-badge{
  display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:20px;font-family:var(--font-mono);font-size:.65rem;
}
.detail-section{margin-bottom:14px}
.detail-section-title{
  font-family:var(--font-mono);font-size:.65rem;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;
}
.detail-body{
  font-size:.82rem;line-height:1.7;color:var(--text-secondary);
  padding:12px;background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:var(--radius);max-height:200px;overflow-y:auto;
}
.detail-timeline{display:flex;flex-direction:column;gap:0}
.timeline-item{display:flex;gap:10px;padding:8px 0;position:relative;}
.timeline-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;
  border:2px solid var(--border);background:var(--bg);position:relative;z-index:1;
}
.timeline-item.done .timeline-dot{border-color:var(--cyan);background:var(--cyan)}
.timeline-item.active .timeline-dot{border-color:var(--accent);background:var(--accent);box-shadow:0 0 8px var(--accent-glow)}
.timeline-item.pending .timeline-dot{border-color:var(--text-muted)}
.timeline-line{position:absolute;left:4px;top:14px;bottom:-6px;width:2px;background:var(--border);}
.timeline-item:last-child .timeline-line{display:none}
.timeline-info{flex:1}
.timeline-label{font-size:.78rem;font-weight:500}
.timeline-time{font-family:var(--font-mono);font-size:.65rem;color:var(--text-muted);margin-top:2px}
.stats-row{grid-column:1/3;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat-card{
  padding:14px 16px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:40%;
  background:linear-gradient(to top,var(--stat-glow,transparent),transparent);opacity:.15;
}
.stat-label{font-family:var(--font-mono);font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.stat-value{font-family:var(--font-display);font-size:1.6rem;font-weight:800;margin-top:4px;position:relative;z-index:1}
.stat-change{font-family:var(--font-mono);font-size:.65rem;margin-top:4px}
.stat-change.up{color:var(--cyan)}
.stat-change.down{color:var(--coral)}
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  z-index:1000;display:none;align-items:center;justify-content:center;animation:fadeIn .2s ease;
}
.modal-overlay.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  width:520px;max-width:90vw;max-height:80vh;overflow-y:auto;padding:24px;animation:slideUp .3s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.modal-title{font-family:var(--font-display);font-weight:700;font-size:1.1rem;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-family:var(--font-mono);font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.form-input,.form-select,.form-textarea{
  width:100%;padding:10px 12px;background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-family:var(--font-body);font-size:.85rem;
  transition:border-color .2s;outline:none;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:80px}
.form-select{cursor:pointer}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.toast-container{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:12px 16px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);font-family:var(--font-mono);font-size:.78rem;
  display:flex;align-items:center;gap:8px;animation:toastIn .3s ease;
  box-shadow:0 8px 30px rgba(0,0,0,.3);min-width:260px;
}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
.toast.success{border-left:3px solid var(--cyan)}
.toast.info{border-left:3px solid var(--blue)}
.toast.warning{border-left:3px solid var(--accent)}
.toast.error{border-left:3px solid var(--coral)}
@media(max-width:1100px){
  .main-grid{grid-template-columns:1fr 300px;grid-template-rows:auto auto 1fr}
  .agents-row{grid-column:1/-1}
  .stats-row{grid-column:1/-1}
  .detail-panel{grid-row:auto;grid-column:2}
}
@media(max-width:768px){
  .main-grid{grid-template-columns:1fr;grid-template-rows:auto auto auto auto}
  .detail-panel{grid-column:1}
  .agents-row{flex-wrap:nowrap}
  .stats-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <div class="logo">M</div>
      <div>
        <div class="header-title">Multi-Agent Content Ops</div>
        <div class="header-subtitle">agent-orchestrator v2.4.0 — 多智能体内容运营引擎</div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-stat"><span class="dot dot-active"></span> <span id="activeAgentCount">6</span> Agents Online</div>
      <div class="header-stat"><span class="dot dot-busy"></span> <span id="queueCount">0</span> In Queue</div>
      <button class="btn" onclick="showNewWorkflow()">+ 新建工作流</button>
      <button class="btn btn-primary" onclick="runDemoWorkflow()">▶ 运行演示</button>
    </div>
  </header>
  <div class="main-grid">
    <div class="agents-row" id="agentsRow"></div>
    <div class="pipeline-panel">
      <div class="panel-title">内容流水线 <span class="count" id="pipelineCount">0 items</span></div>
      <div class="pipeline-stages" id="pipelineStages"></div>
      <div class="content-list" id="contentList"></div>
    </div>
    <div class="log-panel">
      <div class="panel-title">Agent 通信日志 <span class="count" id="logCount">0 messages</span></div>
      <div class="log-list" id="logList"></div>
    </div>
    <div class="detail-panel" id="detailPanel">
      <div class="panel-title">内容详情</div>
      <div class="detail-empty" id="detailEmpty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        <span>选择内容项查看详情</span>
      </div>
      <div class="detail-content" id="detailContent" style="display:none"></div>
    </div>
    <div class="stats-row">
      <div class="stat-card" style="--stat-glow:var(--accent)">
        <div class="stat-label">今日产出</div>
        <div class="stat-value" id="statProduced">0</div>
        <div class="stat-change up" id="statProducedChange">↑ +0 vs 昨日</div>
      </div>
      <div class="stat-card" style="--stat-glow:var(--cyan)">
        <div class="stat-label">审核通过率</div>
        <div class="stat-value" id="statPassRate">—</div>
        <div class="stat-change up">目标 ≥ 85%</div>
      </div>
      <div class="stat-card" style="--stat-glow:var(--violet)">
        <div class="stat-label">平均处理时长</div>
        <div class="stat-value" id="statAvgTime">—</div>
        <div class="stat-change">per content item</div>
      </div>
      <div class="stat-card" style="--stat-glow:var(--blue)">
        <div class="stat-label">Agent 协作次数</div>
        <div class="stat-value" id="statCollabs">0</div>
        <div class="stat-change up">跨Agent消息</div>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">创建内容工作流</div>
    <div class="form-group">
      <label class="form-label">内容主题</label>
      <input class="form-input" id="inputTopic" placeholder="例：2025 AI行业趋势分析" />
    </div>
    <div class="form-group">
      <label class="form-label">内容类型</label>
      <select class="form-select" id="inputType">
        <option value="article">深度文章</option>
        <option value="social">社媒短文</option>
        <option value="newsletter">Newsletter</option>
        <option value="video_script">视频脚本</option>
        <option value="whitepaper">白皮书</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">目标平台</label>
      <select class="form-select" id="inputPlatform">
        <option value="wechat">微信公众号</option>
        <option value="zhihu">知乎</option>
        <option value="weibo">微博</option>
        <option value="douyin">抖音</option>
        <option value="all">全平台</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">关键词（逗号分隔）</label>
      <input class="form-input" id="inputKeywords" placeholder="AI, 自动化, 内容运营" />
    </div>
    <div class="form-group">
      <label class="form-label">附加说明</label>
      <textarea class="form-textarea" id="inputNotes" placeholder="对内容的特殊要求..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="submitWorkflow()">创建工作流</button>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script>
class EventBus {
  constructor() { this.listeners = {} }
  on(event, fn) {
    (this.listeners[event] = this.listeners[event] || []).push(fn);
    return () => this.off(event, fn);
  }
  off(event, fn) {
    this.listeners[event] = (this.listeners[event] || []).filter(f => f !== fn);
  }
  emit(event, data) {
    (this.listeners[event] || []).forEach(fn => fn(data));
  }
}
const bus = new EventBus();
let nextId = 1;
const uid = () => `id-${nextId++}`;
const STAGES = ['planning', 'writing', 'seo', 'review', 'publishing', 'published'];
const STAGE_LABELS = { planning:'策划中', writing:'撰写中', seo:'SEO优化', review:'审核中', publishing:'发布中', published:'已发布' };
const STAGE_COLORS = { planning:'var(--blue)', writing:'var(--accent)', seo:'var(--violet)', review:'var(--coral)', publishing:'var(--cyan)', published:'var(--cyan)' };
const TYPE_LABELS = { article:'深度文章', social:'社媒短文', newsletter:'Newsletter', video_script:'视频脚本', whitepaper:'白皮书' };
const PLATFORM_LABELS = { wechat:'微信公众号', zhihu:'知乎', weibo:'微博', douyin:'抖音', all:'全平台' };
class ContentItem {
  constructor({ topic, type, platform, keywords, notes }) {
    this.id = uid(); this.topic = topic; this.type = type; this.platform = platform;
    this.keywords = keywords; this.notes = notes; this.stage = 'planning';
    this.createdAt = Date.now(); this.timeline = [{ stage: 'created', time: Date.now(), agent: 'System' }];
    this.content = ''; this.seoScore = 0; this.reviewScore = 0; this.reviewComments = []; this.metadata = {};
  }
  advance(nextStage, agentName) {
    this.stage = nextStage;
    this.timeline.push({ stage: nextStage, time: Date.now(), agent: agentName });
  }
}
class Agent {
  constructor(name, role, color, icon) {
    this.name = name; this.role = role; this.color = color; this.icon = icon;

function formatTime(ts) { const d=new Date(ts); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`; }
function formatTimeShort(ts) { const d=new Date(ts); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }
function showToast(msg, type='info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div'); toast.className = `toast ${type}`;
  const icons = { success:'✓', info:'ℹ', warning:'⚠', error:'✕' };
  toast.innerHTML = `<span style="font-weight:600">${icons[type]||'ℹ'}</span> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity='0'; toast.style.transform='translateX(40px)'; toast.style.transition='all .3s'; setTimeout(()=>toast.remove(),300); }, 3500);
}
